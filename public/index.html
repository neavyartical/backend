<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReelMind AI</title>
</head>
<body>

  <h1>ReelMind AI 🚀</h1>

  <input id="prompt" type="text" placeholder="Enter your idea">
  <br><br>

  <button onclick="generate('story')">Story</button>
  <button onclick="generate('image')">Image</button>
  <button onclick="generate('video')">Video</button>

  <h3>Result:</h3>
  <div id="result"></div>

  <script>
    async function generate(type) {
      const prompt = document.getElementById("prompt").value;
      const result = document.getElementById("result");

      if (!prompt) {
        result.textContent = "❌ Please enter something";
        return;
      }

      result.textContent = "⏳ Generating...";

      try {
        const response = await fetch("/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt: prompt, type: type })
        });

        const data = await response.json();
        result.textContent = data.result;

      } catch (error) {
        result.textContent = "❌ Error connecting to server";
      }
    }
  </script>

</body>
</html>
