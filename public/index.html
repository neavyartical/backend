<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
</head>
<body>

<h1>ReelMind AI 🚀</h1>

<input id="prompt" type="text" placeholder="Enter idea">
<br><br>

<button onclick="generate('story')">Story</button>
<button onclick="generate('image')">Image</button>
<button onclick="generate('video')">Video</button>

<div id="result"></div>

<script>
async function generate(type) {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  if (!prompt) {
    result.textContent = "❌ Enter something";
    return;
  }

  result.textContent = "⏳ Generating...";

  try {
    const res = await fetch("/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt, type })
    });

    const data = await res.json();
    result.textContent = data.result;

  } catch (err) {
    result.textContent = "❌ Server error";
  }
}
</script>

</body>
</html>
