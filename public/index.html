<script>
async function generate(type) {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  if (!prompt) {
    result.textContent = "❌ Please enter something";
    return;
  }

  result.textContent = "⏳ Generating...";

  try {
    const response = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: prompt, type: type })
    });

    const data = await response.json();
    result.textContent = data.result;

  } catch (error) {
    result.textContent = "❌ Error connecting to server";
  }
}
</script>
