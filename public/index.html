<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <h1>ReelMind <span>AI</span></h1>
    <p>AI-powered viral content generator</p>
  </header>

  <!-- INPUT -->
  <div class="input-box">
    <textarea id="prompt" placeholder="Describe your idea..."></textarea>
    <button onclick="generate()">✨ Generate</button>
  </div>

  <!-- TOOLS -->
  <div class="tools">
    <button onclick="generateType('story')">📖 Story</button>
    <button onclick="generateType('image')">🖼 Image</button>
    <button onclick="generateType('video')">🎬 Video</button>
    <button onclick="askAI()">🌍 Ask AI</button>
  </div>

  <!-- RESULT -->
  <div id="result" class="result-box">
    <p>Your result will appear here...</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
